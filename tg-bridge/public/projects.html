<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1c1c1e;
    color: #f5f5f7;
    margin: 0;
    padding: 44px 20px;
  }
  .page { max-width: 460px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 28px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .stat { background: #242426; border-radius: 14px; padding: 16px; }
  .stat-label { font-size: 12px; color: #8e8e93; margin: 0 0 6px; }
  .stat-value { font-size: 30px; font-weight: 600; color: #f5f5f7; margin: 0; }
  .stat-value.accent { color: #409cff; }
  .card { background: #242426; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .card-name { font-size: 16px; font-weight: 600; color: #f5f5f7; margin: 0 0 6px; }
  .card-meta { font-size: 13px; color: #8e8e93; margin: 0 0 10px; }
  .card-summary { font-size: 14px; color: #d1d1d6; line-height: 1.5; margin: 0; }
  .card-issues { font-size: 13px; color: #409cff; margin: 10px 0 0; line-height: 1.5; }
  .card-updated { font-size: 12px; color: #636366; margin: 10px 0 0; }
  .section-label { font-size: 12px; font-weight: 500; letter-spacing: 0.04em; color: #8e8e93; text-transform: uppercase; margin: 24px 0 10px; }
  .ops-list { background: #242426; border-radius: 14px; padding: 4px 16px; }
  .ops-row { padding: 10px 0; border-bottom: 1px solid #313133; font-size: 13px; color: #d1d1d6; }
  .ops-row:last-child { border-bottom: none; }
  .empty { font-size: 14px; color: #8e8e93; padding: 13px 0; }
  .error { font-size: 13px; color: #ff453a; margin-top: 24px; }
</style>
</head>
<body>
  <div class="page">
    <h1 id="title"></h1>

    <div class="stats">
      <div class="stat">
        <p class="stat-label" id="stat-total-label"></p>
        <p class="stat-value" id="stat-total-value"></p>
      </div>
      <div class="stat">
        <p class="stat-label" id="stat-issues-label"></p>
        <p class="stat-value accent" id="stat-issues-value"></p>
      </div>
    </div>

    <div id="project-list"></div>

    <p class="section-label" id="ops-label"></p>
    <div class="ops-list" id="ops-list"></div>

    <div class="error" id="error"></div>
  </div>

<script>
// UI 文字抽成字典，之後要加語系只是加一份 key，不用重寫版面；
// 專案名稱/摘要等本身是使用者資料，不受這個字典影響。
const STRINGS = {
  'zh-Hant': {
    title: 'Projects',
    statTotal: '專案數',
    statIssues: '待解決',
    opsLabel: '維運狀況',
    emptyProjects: '目前沒有專案紀錄',
    issuesPrefix: '待解決：'
  }
};
const LOCALE = 'zh-Hant';
function t(key, ...args) {
  const v = STRINGS[LOCALE][key];
  return typeof v === 'function' ? v(...args) : v;
}

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function renderProjects(container, projects) {
  container.innerHTML = '';
  if (projects.length === 0) {
    container.appendChild(el('p', 'empty', t('emptyProjects')));
    return;
  }
  for (const p of projects) {
    const card = el('div', 'card');
    card.appendChild(el('p', 'card-name', p.name));
    card.appendChild(el('p', 'card-meta', [p.status, p.phase].filter(Boolean).join(' ｜ ')));
    if (p.summary) card.appendChild(el('p', 'card-summary', p.summary));
    if (p.issues) card.appendChild(el('p', 'card-issues', `${t('issuesPrefix')}${p.issues}`));
    if (p.lastUpdated) card.appendChild(el('p', 'card-updated', p.lastUpdated));
    container.appendChild(card);
  }
}

function renderOpsHealth(container, checks) {
  container.innerHTML = '';
  for (const line of checks || []) {
    container.appendChild(el('div', 'ops-row', line));
  }
}

async function load() {
  document.getElementById('title').textContent = t('title');
  const res = await fetch('/api/projects');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();

  const projects = data.projects || [];
  document.getElementById('stat-total-label').textContent = t('statTotal');
  document.getElementById('stat-total-value').textContent = projects.length;
  document.getElementById('stat-issues-label').textContent = t('statIssues');
  document.getElementById('stat-issues-value').textContent = projects.filter(p => p.issues).length;

  renderProjects(document.getElementById('project-list'), projects);

  document.getElementById('ops-label').textContent = t('opsLabel');
  renderOpsHealth(document.getElementById('ops-list'), data.opsHealth);
}

load().catch(err => {
  document.getElementById('error').textContent = err.message || String(err);
});
</script>
</body>
</html>
