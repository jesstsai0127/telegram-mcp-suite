<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一般設定</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1c1c1e;
    color: #f5f5f7;
    margin: 0;
    padding: 44px 20px;
  }
  .page { max-width: 460px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 28px; }
  .card { background: #242426; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .field-label { font-size: 15px; font-weight: 500; color: #f5f5f7; margin: 0 0 4px; }
  .field-desc { font-size: 13px; color: #8e8e93; margin: 0 0 12px; line-height: 1.5; }
  input {
    width: 100%; box-sizing: border-box; background: #1c1c1e; color: #f5f5f7;
    border: 1px solid #3a3a3c; border-radius: 8px; padding: 10px 12px; font-size: 15px; font-family: inherit;
  }
  input:focus { outline: none; border-color: #409cff; }
  .btn { font-size: 13px; font-weight: 500; padding: 7px 12px; border-radius: 8px; border: none; cursor: pointer; }
  .btn-primary { background: #409cff; color: #fff; margin-top: 12px; }
  .saved-msg { font-size: 13px; color: #30d158; margin-top: 8px; display: none; }
  .error { font-size: 13px; color: #ff453a; margin-top: 24px; }
</style>
</head>
<body>
  <div class="page">
    <h1 id="title"></h1>
    <div id="settings-list"></div>
    <div class="error" id="error"></div>
  </div>

<script>
const STRINGS = {
  'zh-Hant': {
    title: '一般設定',
    save: '儲存',
    saved: '已儲存',
    saveFailed: '儲存失敗，換個方式再試一次'
  }
};
const LOCALE = 'zh-Hant';
function t(key) { return STRINGS[LOCALE][key]; }

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

async function saveSetting(key, value) {
  const res = await fetch('/api/settings', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ [key]: value })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function renderSettings(container, items) {
  container.innerHTML = '';
  for (const item of items) {
    const card = el('div', 'card');
    card.appendChild(el('p', 'field-label', item.label));
    card.appendChild(el('p', 'field-desc', item.description));

    const input = el('input', '');
    input.type = 'time';
    input.value = item.value;
    card.appendChild(input);

    const savedMsg = el('p', 'saved-msg', t('saved'));
    const saveBtn = el('button', 'btn btn-primary', t('save'));
    saveBtn.addEventListener('click', async () => {
      try {
        const updated = await saveSetting(item.key, input.value);
        input.value = updated[item.key];
        savedMsg.style.display = 'block';
        setTimeout(() => { savedMsg.style.display = 'none'; }, 2000);
      } catch (err) {
        document.getElementById('error').textContent = err.message || String(err);
      }
    });
    card.appendChild(saveBtn);
    card.appendChild(savedMsg);

    container.appendChild(card);
  }
}

async function load() {
  document.getElementById('title').textContent = t('title');
  const res = await fetch('/api/settings');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  renderSettings(document.getElementById('settings-list'), data.settings || []);
}

load().catch(err => {
  document.getElementById('error').textContent = err.message || String(err);
});
</script>
</body>
</html>
