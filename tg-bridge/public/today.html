<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1c1c1e;
    color: #f5f5f7;
    margin: 0;
    padding: 44px 20px;
  }
  .page { max-width: 460px; margin: 0 auto; }
  h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
  .subtitle { font-size: 14px; color: #8e8e93; margin: 0 0 28px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .stat { background: #242426; border-radius: 14px; padding: 16px; }
  .stat-label { font-size: 12px; color: #8e8e93; margin: 0 0 6px; }
  .stat-value { font-size: 30px; font-weight: 600; color: #f5f5f7; margin: 0; }
  .stat-value.accent { color: #409cff; }
  .section-label { font-size: 12px; font-weight: 500; letter-spacing: 0.04em; color: #8e8e93; text-transform: uppercase; margin: 0 0 10px; }
  .section { background: #242426; border-radius: 14px; padding: 4px 16px; margin-bottom: 16px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 13px 0; border-bottom: 1px solid #313133; }
  .row:last-child { border-bottom: none; }
  .row-left { display: flex; align-items: center; gap: 12px; font-size: 15px; }
  .status-icon { flex-shrink: 0; font-size: 14px; }
  .title-done { color: #8e8e93; }
  .title-todo { color: #f5f5f7; font-weight: 500; }
  .due { font-size: 13px; white-space: nowrap; }
  .due-set { color: #409cff; font-weight: 600; }
  .due-unset { color: #636366; font-weight: 400; }
  .empty { font-size: 14px; color: #8e8e93; padding: 13px 0; }
  .error { font-size: 13px; color: #ff453a; margin-top: 24px; }
</style>
</head>
<body>
  <div class="page">
    <h1 id="title"></h1>
    <p class="subtitle" id="subtitle"></p>

    <div class="stats">
      <div class="stat">
        <p class="stat-label" id="stat-completed-label"></p>
        <p class="stat-value" id="stat-completed-value"></p>
      </div>
      <div class="stat">
        <p class="stat-label" id="stat-unfinished-label"></p>
        <p class="stat-value accent" id="stat-unfinished-value"></p>
      </div>
    </div>

    <div class="section" id="completed-list"></div>

    <p class="section-label" id="unfinished-label"></p>
    <div class="section" id="unfinished-list"></div>

    <div class="error" id="error"></div>
  </div>

<script>
// UI 文字抽成字典，之後要加語系只是加一份 key，不用重寫版面；
// 任務標題/日期本身是使用者資料，不受這個字典影響。
const STRINGS = {
  'zh-Hant': {
    title: 'Today',
    statCompleted: '已完成',
    statUnfinished: '未完成',
    unfinishedLabel: (n) => `未完成 · ${n}`,
    emptyCompleted: '過去 24 小時內沒有完成的項目',
    emptyUnfinished: '目前沒有待辦事項',
    noDueDate: '無截止時間'
  }
};
const LOCALE = 'zh-Hant';
function t(key, ...args) {
  const v = STRINGS[LOCALE][key];
  return typeof v === 'function' ? v(...args) : v;
}

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function renderCompleted(container, items) {
  container.innerHTML = '';
  if (items.length === 0) {
    container.appendChild(el('p', 'empty', t('emptyCompleted')));
    return;
  }
  for (const item of items) {
    const row = el('div', 'row');
    const left = el('div', 'row-left');
    // 2026-07-07：原本用圓圈+勾勾（.dot-done）呈現，視覺上跟真的可以點的 checkbox
    // 沒兩樣，但這個頁面是唯讀的（要編輯待辦請用 /todo 的「待辦清單」），改用純文字
    // emoji，跟 Telegram 文字版本（format.js 的 ✅/📌/⏳）同一套符號，不再暗示可互動
    left.appendChild(el('span', 'status-icon', '✅'));
    left.appendChild(el('span', 'title-done', item.title));
    row.appendChild(left);
    container.appendChild(row);
  }
}

function renderUnfinished(container, items) {
  container.innerHTML = '';
  if (items.length === 0) {
    container.appendChild(el('p', 'empty', t('emptyUnfinished')));
    return;
  }
  for (const item of items) {
    const row = el('div', 'row');
    const left = el('div', 'row-left');
    // 跟 format.js 的 Telegram 文字版本同一套符號（進行中 ⏳、待辦 📌），
    // 純文字 emoji，不是可以點的 checkbox
    left.appendChild(el('span', 'status-icon', item.status === '進行中' ? '⏳' : '📌'));
    left.appendChild(el('span', 'title-todo', item.title));
    row.appendChild(left);
    row.appendChild(el('span', `due ${item.dueDate ? 'due-set' : 'due-unset'}`, item.dueDate || t('noDueDate')));
    container.appendChild(row);
  }
}

async function load() {
  document.getElementById('title').textContent = t('title');
  const res = await fetch('/api/today');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();

  document.getElementById('subtitle').textContent = data.date || '';
  document.getElementById('stat-completed-label').textContent = t('statCompleted');
  document.getElementById('stat-completed-value').textContent = data.completed.length;
  document.getElementById('stat-unfinished-label').textContent = t('statUnfinished');
  document.getElementById('stat-unfinished-value').textContent = data.unfinished.length;
  document.getElementById('unfinished-label').textContent = t('unfinishedLabel', data.unfinished.length);
  renderCompleted(document.getElementById('completed-list'), data.completed);
  renderUnfinished(document.getElementById('unfinished-list'), data.unfinished);
}

load().catch(err => {
  document.getElementById('error').textContent = err.message || String(err);
});
</script>
</body>
</html>
