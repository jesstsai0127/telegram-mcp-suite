<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增待辦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1c1c1e;
    color: #f5f5f7;
    margin: 0;
    padding: 16px 20px 100px;
  }
  .page { max-width: 460px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin: 8px 0 20px; }
  .field-label { font-size: 11px; color: #8e8e93; margin: 0 0 4px; }
  input, select, textarea {
    width: 100%; box-sizing: border-box; background: #242426; color: #f5f5f7;
    border: 1px solid #3a3a3c; border-radius: 8px; padding: 10px 12px; font-size: 15px;
    font-family: inherit; margin-bottom: 14px;
    transition: background-color .6s ease, border-color .6s ease;
  }
  textarea { resize: none; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .toggle-card {
    background: #242426; border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
    border: 1px solid transparent; transition: background-color .6s ease, border-color .6s ease;
  }
  /* 連續新增：送出成功後短暫標亮「沿用上次設定」的欄位，避免使用者沒發現這些值沒被清空 */
  .retained-flash { background-color: rgba(64,156,255,0.18) !important; border-color: #409cff !important; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .switch { position: relative; display: inline-block; width: 44px; height: 26px; flex: 0 0 auto; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .track {
    position: absolute; inset: 0; background: #3a3a3c; border-radius: 13px; transition: background .15s;
  }
  .thumb {
    position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
    background: #f5f5f7; border-radius: 50%; transition: transform .15s;
  }
  .chip {
    font-size: 13px; padding: 6px 12px; border-radius: 20px; cursor: pointer;
    background: #1c1c1e; color: #8e8e93; border: 1px solid #3a3a3c;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .chip.active { background: rgba(64,156,255,0.2); color: #409cff; border-color: #409cff; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .weekday-chips .chip { width: 34px; height: 34px; padding: 0; border-radius: 50%; }
  .error { font-size: 13px; color: #ff453a; margin-top: 12px; }
</style>
</head>
<body>
  <div class="page">
    <div style="display:flex;align-items:baseline;justify-content:space-between;">
      <h1>新增待辦</h1>
      <span id="resetAllBtn" style="font-size:13px;color:#409cff;cursor:pointer;">重設全部</span>
    </div>

    <p class="field-label">標題</p>
    <input type="text" id="title" placeholder="要做什麼">

    <div class="row-2">
      <div>
        <p class="field-label">優先度</p>
        <select id="priority">
          <option value="中" selected>中</option>
          <option value="高">高</option>
          <option value="低">低</option>
        </select>
      </div>
      <div>
        <p class="field-label">分類</p>
        <input type="text" id="category" placeholder="一般">
      </div>
    </div>

    <div class="toggle-card" id="recurringToggleCard">
      <div class="toggle-row">
        <span style="font-size:15px;">重複</span>
        <label class="switch">
          <input type="checkbox" id="recurringToggle">
          <span class="track" id="recurringTrack"></span>
          <span class="thumb" id="recurringThumb"></span>
        </label>
      </div>
    </div>

    <!-- 一次性：到期時間（含「先不設時間」跟提醒），重複開啟時整塊隱藏 -->
    <div class="toggle-card" id="onceSection">
      <div class="toggle-row">
        <span style="font-size:15px;">先不設時間（還在考慮）</span>
        <label class="switch">
          <input type="checkbox" id="noDateToggle">
          <span class="track" id="noDateTrack"></span>
          <span class="thumb" id="noDateThumb"></span>
        </label>
      </div>
      <div id="dateSection" style="margin-top:12px;">
        <p class="field-label">到期時間</p>
        <input type="datetime-local" id="dueInput" style="color-scheme: dark;">
        <p class="field-label" style="margin-bottom:8px;">提醒</p>
        <div class="chips">
          <span class="chip active" data-chip="1天前">1天前</span>
          <span class="chip active" data-chip="1小時前">1小時前</span>
          <span class="chip" data-chip="30分鐘前">30分鐘前</span>
        </div>
      </div>
    </div>

    <!-- 重複：頻率 + 依頻率變化的欄位 + 時間，重複關閉時整塊隱藏 -->
    <div class="toggle-card" id="recurringSection" style="display:none;">
      <p class="field-label">頻率</p>
      <select id="freqSelect">
        <option value="daily">每天</option>
        <option value="weekly" selected>每週</option>
        <option value="monthly">每月</option>
        <option value="yearly">每年</option>
      </select>

      <div id="weeklyFields">
        <p class="field-label">星期幾</p>
        <div class="chips weekday-chips" style="margin-bottom:14px;">
          <span class="chip" data-weekday="MO">一</span>
          <span class="chip" data-weekday="TU">二</span>
          <span class="chip" data-weekday="WE">三</span>
          <span class="chip" data-weekday="TH">四</span>
          <span class="chip" data-weekday="FR">五</span>
          <span class="chip" data-weekday="SA">六</span>
          <span class="chip" data-weekday="SU">日</span>
        </div>
      </div>

      <div id="monthlyFields" style="display:none;">
        <p class="field-label">每月第幾號</p>
        <input type="number" id="monthdayInput" min="1" max="31" value="1">
      </div>

      <div id="yearlyFields" style="display:none;">
        <div class="row-2">
          <div>
            <p class="field-label">月份</p>
            <input type="number" id="yearlyMonthInput" min="1" max="12" value="1">
          </div>
          <div>
            <p class="field-label">日期</p>
            <input type="number" id="yearlyDayInput" min="1" max="31" value="1">
          </div>
        </div>
      </div>

      <p class="field-label">時間</p>
      <input type="time" id="recurringTimeInput" value="09:00" style="margin-bottom:0;color-scheme: dark;">
    </div>

    <p class="field-label">備註</p>
    <textarea id="notes" rows="2" placeholder="補充說明（選填）"></textarea>

    <p class="error" id="error"></p>
  </div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  // 這個頁面固定深色，不跟隨使用者的 Telegram 主題色——跟其它 today.html/shopping.html
  // 這批網頁一致（目前整個專案沒有淺色版），把 Telegram 外框（header/背景）也漆成同一色
  // 才不會外框跟表單本體顏色不一致
  tg.setHeaderColor('#1c1c1e');
  tg.setBackgroundColor('#1c1c1e');
}

function wireToggle(checkboxId, trackId, thumbId, onChange) {
  const checkbox = document.getElementById(checkboxId);
  const track = document.getElementById(trackId);
  const thumb = document.getElementById(thumbId);
  checkbox.addEventListener('change', () => {
    track.style.background = checkbox.checked ? '#409cff' : '#3a3a3c';
    thumb.style.transform = checkbox.checked ? 'translateX(18px)' : 'translateX(0)';
    onChange(checkbox.checked);
  });
  return checkbox;
}

const noDateToggle = wireToggle('noDateToggle', 'noDateTrack', 'noDateThumb', (checked) => {
  const dateSection = document.getElementById('dateSection');
  dateSection.style.opacity = checked ? '0.35' : '1';
  dateSection.style.pointerEvents = checked ? 'none' : 'auto';
});

// 「重複」是使用者確認過的既有需求：之前拒絕合併一次性/週期性按鈕是因為只能靠文字
// 猜（例如「每」這個字），這次是表單上明確的開關，不是猜測，跟之前的原則不衝突
const recurringToggle = wireToggle('recurringToggle', 'recurringTrack', 'recurringThumb', (checked) => {
  document.getElementById('onceSection').style.display = checked ? 'none' : 'block';
  document.getElementById('recurringSection').style.display = checked ? 'block' : 'none';
});

document.querySelectorAll('#onceSection [data-chip]').forEach(chip => {
  chip.addEventListener('click', () => chip.classList.toggle('active'));
});
document.querySelectorAll('[data-weekday]').forEach(chip => {
  chip.addEventListener('click', () => chip.classList.toggle('active'));
});

const freqSelect = document.getElementById('freqSelect');
freqSelect.addEventListener('change', () => {
  const freq = freqSelect.value;
  document.getElementById('weeklyFields').style.display = freq === 'weekly' ? 'block' : 'none';
  document.getElementById('monthlyFields').style.display = freq === 'monthly' ? 'block' : 'none';
  document.getElementById('yearlyFields').style.display = freq === 'yearly' ? 'block' : 'none';
});

function resetChipGroup(selector, defaultActive) {
  document.querySelectorAll(selector).forEach(chip => {
    const key = chip.dataset.chip ?? chip.dataset.weekday;
    chip.classList.toggle('active', defaultActive.includes(key));
  });
}

function setToggleChecked(checkbox, checked) {
  if (checkbox.checked === checked) return;
  checkbox.checked = checked;
  checkbox.dispatchEvent(new Event('change'));
}

// 重設全部：回到表單初始狀態，讓使用者結束一個批次的連續新增後，
// 不用逐一把「沿用上次設定」的欄位手動改回預設值
function resetForm() {
  document.getElementById('title').value = '';
  document.getElementById('priority').value = '中';
  document.getElementById('category').value = '';
  document.getElementById('notes').value = '';

  setToggleChecked(recurringToggle, false);
  setToggleChecked(noDateToggle, false);
  document.getElementById('dueInput').value = '';
  resetChipGroup('#onceSection [data-chip]', ['1天前', '1小時前']);

  freqSelect.value = 'weekly';
  freqSelect.dispatchEvent(new Event('change'));
  resetChipGroup('[data-weekday]', []);
  document.getElementById('monthdayInput').value = 1;
  document.getElementById('yearlyMonthInput').value = 1;
  document.getElementById('yearlyDayInput').value = 1;
  document.getElementById('recurringTimeInput').value = '09:00';

  const errorEl = document.getElementById('error');
  errorEl.style.color = '#8e8e93';
  errorEl.textContent = '已重設';
  document.getElementById('title').focus();
}

document.getElementById('resetAllBtn').addEventListener('click', resetForm);

// 連續新增送出成功後，短暫標亮「沿用上次設定」的欄位（見 .retained-flash），
// 提醒使用者這些值不是這一筆重新輸入的，是延續上一筆
function flashRetained(ids) {
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('retained-flash');
    setTimeout(() => el.classList.remove('retained-flash'), 1600);
  });
}

function collectPayload() {
  const title = document.getElementById('title').value.trim();
  if (!title) return { error: '請輸入標題' };

  const payload = {
    title,
    priority: document.getElementById('priority').value,
    category: document.getElementById('category').value.trim() || null,
    notes: document.getElementById('notes').value.trim() || null
  };

  if (recurringToggle.checked) {
    const freq = freqSelect.value;
    const time = document.getElementById('recurringTimeInput').value || '09:00';
    const recurrence = { freq, byweekday: null, bysetpos: null, bymonthday: null, bymonth: null, time };
    if (freq === 'weekly') {
      const days = Array.from(document.querySelectorAll('[data-weekday].active')).map(c => c.dataset.weekday);
      if (days.length === 0) return { error: '請至少選一個星期幾' };
      recurrence.byweekday = days;
    }
    if (freq === 'monthly') {
      recurrence.bymonthday = Number(document.getElementById('monthdayInput').value) || 1;
    }
    if (freq === 'yearly') {
      recurrence.bymonth = Number(document.getElementById('yearlyMonthInput').value) || 1;
      recurrence.bymonthday = Number(document.getElementById('yearlyDayInput').value) || 1;
    }
    payload.recurrence = recurrence;
    return { payload };
  }

  payload.due_date = null;
  payload.reminders = null;
  if (!noDateToggle.checked) {
    const dueRaw = document.getElementById('dueInput').value;
    if (!dueRaw) return { error: '請選到期時間，或開啟「先不設時間」' };
    payload.due_date = dueRaw.replace('T', ' ');
    const activeChips = Array.from(document.querySelectorAll('#onceSection [data-chip].active')).map(c => c.dataset.chip);
    if (activeChips.length > 0) payload.reminders = activeChips;
  }

  return { payload };
}

async function submit() {
  const errorEl = document.getElementById('error');
  errorEl.style.color = '#ff453a';
  errorEl.textContent = '';
  const { payload, error } = collectPayload();
  if (error) { errorEl.textContent = error; return; }

  try {
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    // 連續新增：不關閉 WebApp（Telegram 原生標頭本來就有關閉按鈕），只清空標題/備註
    // 並提示已新增成功，其餘欄位（分類、優先度、到期時間、提醒等）保留，方便連續新增同一批次的項目
    errorEl.style.color = '#30d158';
    errorEl.textContent = `已新增：${payload.title}`;
    const titleInput = document.getElementById('title');
    titleInput.value = '';
    document.getElementById('notes').value = '';
    titleInput.focus();
    flashRetained([
      'priority', 'category', 'recurringToggleCard',
      recurringToggle.checked ? 'recurringSection' : 'onceSection'
    ]);
  } catch (err) {
    errorEl.style.color = '#ff453a';
    errorEl.textContent = err.message || String(err);
  }
}

if (tg) {
  tg.MainButton.setText('新增待辦事項');
  tg.MainButton.show();
  tg.MainButton.onClick(submit);
} else {
  // 沒有 Telegram.WebApp 環境（例如直接用瀏覽器開這個頁面測試）時退回普通按鈕，
  // 不讓頁面完全沒有送出的辦法
  const fallbackBtn = document.createElement('button');
  fallbackBtn.textContent = '新增待辦事項（測試用按鈕）';
  fallbackBtn.style.cssText = 'width:100%;background:#409cff;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px;';
  fallbackBtn.addEventListener('click', submit);
  document.querySelector('.page').appendChild(fallbackBtn);
}
</script>
</body>
</html>
